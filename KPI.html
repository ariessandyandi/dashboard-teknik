<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>KPI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg-color:#0f172a; --card-color:#1e293b; --sidebar-color:#111827;
  --text-color:white; --text-secondary:#94a3b8; --hover-bg:rgba(59,130,246,0.12);
  --border-color:rgba(255,255,255,0.05); --shadow-sm:0 10px 25px -5px rgba(0,0,0,0.1);
  --transition: all 0.25s cubic-bezier(0.2,0.9,0.4,1.1);
}
body.light-mode {
  --bg-color:#f1f5f9; --card-color:#ffffff; --sidebar-color:#eef2ff;
  --text-color:#0f172a; --text-secondary:#475569; --hover-bg:#e2e8f0;
  --border-color:rgba(0,0,0,0.05); --shadow-sm:0 10px 25px -5px rgba(0,0,0,0.05);
}
body { background:var(--bg-color); color:var(--text-color); font-family:'Inter','Segoe UI',system-ui,sans-serif; transition:background .25s ease,color .2s ease; }

.sidebar { width:280px; height:100vh; background:var(--sidebar-color); position:fixed; top:0; left:0; padding:28px 20px; border-right:1px solid var(--border-color); transition:var(--transition); z-index:1050; overflow-x:hidden; overflow-y:auto; }
.sidebar.collapsed { width:88px; padding:28px 12px; }
.sidebar.collapsed .logo-section h4, .sidebar.collapsed .logo-section small { display:none; }
.sidebar.collapsed .logo-section { justify-content:center; }
.sidebar.collapsed .nav-link span { display:none; }
.sidebar.collapsed .nav-link i { margin-right:0; font-size:1.4rem; }
.sidebar.collapsed .nav-link { text-align:center; padding:14px 0; justify-content:center; }
.sidebar.collapsed .nav-link::after { content:attr(data-title); position:absolute; left:100%; top:50%; transform:translateY(-50%); background:#1e293b; color:#f1f5f9; padding:6px 12px; border-radius:10px; font-size:.8rem; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .2s; margin-left:12px; font-weight:500; z-index:1100; box-shadow:0 8px 16px rgba(0,0,0,.2); }
body.light-mode .sidebar.collapsed .nav-link::after { background:#334155; color:#f1f5f9; }
.sidebar.collapsed .nav-link:hover::after { opacity:1; }

.logo-section { display:flex; align-items:center; gap:14px; margin-bottom:48px; }
.logo-section .logo-circle { width:48px; height:48px; border-radius:14px; background:linear-gradient(135deg,#60a5fa,#3b82f6); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:1.3rem; color:white; }
.logo-section h4 { font-size:1.15rem; font-weight:700; margin:0; background:linear-gradient(135deg,#60a5fa,#3b82f6); -webkit-background-clip:text; background-clip:text; color:transparent; }
.logo-section small { font-size:.7rem; color:var(--text-secondary); display:block; }

.nav-link { display:flex; align-items:center; gap:14px; padding:12px 16px; margin-bottom:8px; border-radius:16px; color:var(--text-color); text-decoration:none; font-weight:500; transition:var(--transition); position:relative; font-size:.88rem; }
.nav-link i { width:20px; text-align:center; }
.nav-link:hover { background:var(--hover-bg); transform:translateX(4px); }
.nav-link.active { background:linear-gradient(95deg,#2563eb,#3b82f6); color:white; box-shadow:0 6px 14px rgba(37,99,235,.3); }

.content { margin-left:280px; padding:28px 32px; transition:margin-left .25s ease; }
.content.collapsed { margin-left:88px; }

.topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
.topbar h2 { font-size:1.8rem; font-weight:700; margin:0; }
.topbar .sub { font-size:.8rem; color:var(--text-secondary); }
.topbar-actions { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }

.icon-btn { width:42px; height:42px; border-radius:14px; background:var(--card-color); border:1px solid var(--border-color); color:var(--text-color); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:var(--transition); }
.icon-btn:hover { background:var(--hover-bg); }

.theme-toggle { width:44px; height:44px; border-radius:44px; background:var(--card-color); border:1px solid var(--border-color); color:var(--text-color); font-size:1.3rem; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:var(--transition); }
.theme-toggle:hover { transform:rotate(15deg); background:var(--hover-bg); }

.filter-select { background:var(--card-color); border:1px solid var(--border-color); color:var(--text-color); border-radius:12px; padding:9px 14px; font-size:.85rem; font-weight:500; cursor:pointer; }
.filter-select:focus { outline:none; box-shadow:0 0 0 3px rgba(59,130,246,.2); }

.badge-live { display:flex; align-items:center; gap:6px; background:rgba(34,197,94,.15); color:#22c55e; font-size:.78rem; font-weight:600; padding:6px 12px; border-radius:20px; }
.dot-live { width:7px; height:7px; border-radius:50%; background:#22c55e; }

.kpi-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px; }
.kpi-card { background:var(--card-color); border-radius:22px; padding:18px; box-shadow:var(--shadow-sm); border:1px solid var(--border-color); transition:var(--transition); display:flex; flex-direction:column; gap:10px; }
.kpi-card:hover { transform:translateY(-3px); }
.kpi-head { display:flex; align-items:flex-start; justify-content:space-between; }
.kpi-icon-wrap { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
.kpi-trend { font-size:.72rem; font-weight:600; padding:3px 9px; border-radius:20px; display:flex; align-items:center; gap:4px; }
.trend-up { background:rgba(239,68,68,.15); color:#ef4444; }
.trend-down { background:rgba(34,197,94,.15); color:#22c55e; }
.kpi-value { font-size:1.7rem; font-weight:700; line-height:1; }
.kpi-label { font-size:.78rem; color:var(--text-secondary); font-weight:500; }
.kpi-detail { font-size:.72rem; color:var(--text-secondary); margin-top:2px; }
.kpi-status { display:inline-flex; align-items:center; gap:4px; font-size:.7rem; font-weight:600; padding:3px 9px; border-radius:20px; width:fit-content; }
.st-ok { background:rgba(34,197,94,.15); color:#22c55e; }
.st-warn { background:rgba(234,179,8,.15); color:#eab308; }
.st-bad { background:rgba(239,68,68,.15); color:#ef4444; }

.chart-card { background:var(--card-color); border-radius:22px; padding:18px; box-shadow:var(--shadow-sm); border:1px solid var(--border-color); height:100%; transition:var(--transition); }
.chart-card-title { font-size:.85rem; font-weight:600; color:var(--text-secondary); margin-bottom:14px; text-transform:uppercase; letter-spacing:.03em; }
.chart-wrap { position:relative; height:150px; }

.summary-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:20px; }
.summary-card { background:var(--card-color); border-radius:22px; padding:18px; box-shadow:var(--shadow-sm); border:1px solid var(--border-color); }
.summary-title { font-size:.85rem; font-weight:600; color:var(--text-secondary); margin-bottom:12px; }
.summary-item { display:flex; align-items:center; justify-content:space-between; font-size:.8rem; padding:7px 0; border-bottom:1px solid var(--border-color); }
.summary-item:last-child { border-bottom:none; }
.summary-pill { font-size:.7rem; font-weight:700; padding:3px 9px; border-radius:20px; }

.errbox { background:rgba(239,68,68,.12); color:#ef4444; border-radius:14px; padding:12px 16px; font-size:.85rem; margin-bottom:16px; display:none; }

.mobile-menu-btn { display:none; }
@media (max-width:768px) {
  .sidebar { width:0; padding:0; overflow:hidden; }
  .sidebar.mobile-open { width:280px; padding:28px 20px; }
  .content, .content.collapsed { margin-left:0; padding:20px 16px; }
  .mobile-menu-btn { display:flex; }
  .kpi-row { grid-template-columns:repeat(2,1fr); }
  .summary-row { grid-template-columns:1fr; }
}
@media (max-width:480px) {
  .kpi-row { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<button class="icon-btn mobile-menu-btn" id="mobileMenuBtn" style="position:fixed; top:16px; left:16px; z-index:1100;">
  <i class="fa-solid fa-bars"></i>
</button>

<div class="sidebar collapsed" id="sidebar">
  <div class="logo-section">
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/97/Logo_PLN.png" alt="PLN Logo" style="width:48px;height:48px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2));">
    <div>
      <h4>ULP Sekura</h4>
      <small>KPI</small>
    </div>
  </div>

  <a href="index.html" class="nav-link" data-title="Dashboard">
    <i class="fa-solid fa-chart-line"></i><span>Dashboard</span>
  </a>
  <a href="data-gardu.html" class="nav-link" data-title="Data Gardu">
    <i class="fa-solid fa-building"></i><span>Data Gardu</span>
  </a>
  <a href="KPI.html" class="nav-link active" data-title="KPI">
    <i class="fa-solid fa-arrow-trend-up"></i><span>KPI</span>
  </a>
  <a href="interruptions.html" class="nav-link" data-title="Gangguan">
    <i class="fa-solid fa-bolt"></i><span>Gangguan</span>
  </a>
  <a href="inspeksi.html" class="nav-link" data-title="Inspeksi">
    <i class="fa-solid fa-map-location-dot"></i><span>Inspeksi</span>
  </a>
  <a href="#" class="nav-link" data-title="Reports">
    <i class="fa-solid fa-file-lines"></i><span>Reports</span>
  </a>
</div>

<div class="content collapsed" id="content">

  <div class="topbar">
    <div>
      <h2>KPI</h2>
      <span class="sub" id="updateTime">Memuat data...</span>
    </div>
    <div class="topbar-actions">
      <select class="filter-select" id="monthSelect"></select>
      <select class="filter-select" id="yearSelect">
        <option value="2026" selected>2026</option>
      </select>
      <span class="badge-live"><span class="dot-live"></span>Live</span>
      <button class="icon-btn" id="refreshBtn" title="Refresh data"><i class="fa-solid fa-arrows-rotate"></i></button>
      <button class="theme-toggle" id="themeToggleBtn" title="Ganti tema"><i class="fa-solid fa-moon" id="themeIcon"></i></button>
    </div>
  </div>

  <div class="errbox" id="errbox"></div>

  <div class="kpi-row" id="kpiRow">
    <div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-secondary);">
      <i class="fa-solid fa-spinner fa-spin" style="font-size:1.5rem; margin-bottom:10px; display:block;"></i>
      Memuat data dari spreadsheet...
    </div>
  </div>

  <div class="kpi-row" id="trendRow"></div>

  <div class="summary-row" id="summaryRow"></div>

</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxJWuRpxxFJUaRKp-VdalrXsnbaiD1hwy5B94C7raWEouzlRhVdXAPRSbmnLeEqYUV27r6YhxkFlxe/pub?output=csv&gid=0';

const MONTHS = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];

const KPIS = [
  { name:'Kerusakan PHBTM dan Trafo', unit:'Unit', icon:'fa-bolt',       color:'#3b82f6', rowReal:2, rowTarget:3, rowKinerja:7,  colJan:53  },
  { name:'MVOD',                      unit:'%',    icon:'fa-chart-line', color:'#8b5cf6', rowReal:2, rowTarget:3, rowKinerja:7,  colJan:66  },
  { name:'MTTR Siaga 1 TM',           unit:'%',    icon:'fa-clock',      color:'#f97316', rowReal:2, rowTarget:3, rowKinerja:7,  colJan:79  },
  { name:'Feedback Rating Negatif',   unit:'Kali', icon:'fa-thumbs-down',color:'#14b8a6', rowReal:3, rowTarget:4, rowKinerja:9,  colJan:92  },
  { name:'Response Time Gangguan',    unit:'Menit',icon:'fa-stopwatch',  color:'#06b6d4', rowReal:3, rowTarget:5, rowKinerja:11, colJan:105 },
  { name:'Success Rate Auto Dispatch',unit:'%',    icon:'fa-robot',      color:'#22c55e', rowReal:5, rowTarget:6, rowKinerja:13, colJan:118 },
];

let allData = [];
let globalLastIdx = 0;
let selectedMonthIdx = -1;
let trendCharts = [];

function getStatus(v) {
  if (v > 99)  return ['st-ok',   'Tercapai'];
  if (v >= 90) return ['st-warn', 'Perhatian'];
  return             ['st-bad',  'Tidak Tercapai'];
}
function pNum(v) {
  if (v === undefined || v === null || v === '') return null;
  const s = String(v);
  if (s.includes('#DIV') || s.includes('#REF') || s.trim() === '-') return null;
  const n = parseFloat(s.replace(/[^0-9.,-]/g,'').replace(',','.'));
  return isNaN(n) ? null : n;
}

function buildMonthSelect(lastIdx) {
  const sel = document.getElementById('monthSelect');
  let html = `<option value="-1">Semua bulan (s/d ${MONTHS[lastIdx]})</option>`;
  for (let i = 0; i <= lastIdx; i++) {
    html += `<option value="${i}">${MONTHS[i]}</option>`;
  }
  sel.innerHTML = html;
  sel.value = String(selectedMonthIdx);
}

function isLightMode() {
  return document.body.classList.contains('light-mode');
}

function renderKPIRow() {
  const idx = selectedMonthIdx === -1 ? globalLastIdx : selectedMonthIdx;
  document.getElementById('kpiRow').innerHTML = allData.map(k => {
    const v = k.kinerja[idx];
    const rv = k.real[idx];
    const tv = k.target[idx];
    let statusHtml = '<span class="kpi-status st-warn">Belum ada data</span>';
    let valDisplay = '—';

    if (v !== null && v > 0) {
      const [cls, label] = getStatus(v);
      valDisplay = v.toFixed(1) + '%';
      statusHtml = `<span class="kpi-status ${cls}">${label}</span>`;
    }

    const realStr = rv !== null ? rv.toLocaleString('id-ID',{maximumFractionDigits:2}) : '—';
    const tgtStr  = tv !== null ? tv.toLocaleString('id-ID',{maximumFractionDigits:2}) : '—';

    return `<div class="kpi-card">
      <div class="kpi-head">
        <div class="kpi-icon-wrap" style="background:${k.color}22; color:${k.color}">
          <i class="fa-solid ${k.icon}"></i>
        </div>
        ${statusHtml}
      </div>
      <div>
        <div class="kpi-value">${valDisplay}</div>
        <div class="kpi-label">${k.name}</div>
        <div class="kpi-detail">Real: ${realStr} ${k.unit} &middot; Target: ${tgtStr} ${k.unit}</div>
      </div>
    </div>`;
  }).join('');
}

function renderTrendCharts() {
  trendCharts.forEach(c => c.destroy());
  trendCharts = [];

  const grid = document.getElementById('trendRow');
  grid.innerHTML = allData.map((k, i) => `
    <div class="kpi-card" style="grid-column:span 1;">
      <div class="chart-card-title" style="margin-bottom:8px;">${k.name}</div>
      <div class="chart-wrap"><canvas id="trend${i}"></canvas></div>
    </div>
  `).join('');

  const tickColor = isLightMode() ? '#475569' : '#94a3b8';
  const gridColor = isLightMode() ? '#e2e8f0' : '#334155';

  allData.forEach((k, i) => {
    const points = k.kinerja.map(v => v !== null && v > 0 ? v : null);
    const ctx = document.getElementById('trend' + i);
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: MONTHS_SHORT,
        datasets: [{
          data: points,
          borderColor: k.color,
          backgroundColor: k.color + '22',
          borderWidth: 2,
          pointRadius: (c) => c.dataIndex === k.lastIdx ? 4 : 0,
          pointBackgroundColor: k.color,
          pointBorderColor: isLightMode() ? '#ffffff' : '#1e293b',
          pointBorderWidth: 2,
          fill: true,
          tension: 0.35,
          spanGaps: true
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display:false }, ticks: { color: tickColor, font:{ size:9 } } },
          y: { grid: { color: gridColor }, ticks: { color: tickColor, font:{ size:9 } } }
        }
      }
    });
    trendCharts.push(chart);
  });
}

function renderSummary() {
  const idx = selectedMonthIdx === -1 ? globalLastIdx : selectedMonthIdx;
  const groups = [
    { title:'Tercapai (>99%)', filter:v=>v>99, cls:'st-ok' },
    { title:'Perhatian (90-99%)', filter:v=>v>=90&&v<=99, cls:'st-warn' },
    { title:'Tidak tercapai (<90%)', filter:v=>v<90&&v>0, cls:'st-bad' },
  ];

  document.getElementById('summaryRow').innerHTML = groups.map(g => {
    const items = allData.filter(k => {
      const v = k.kinerja[idx];
      return v !== null && g.filter(v);
    });
    const listHtml = items.length
      ? items.map(k => {
          const v = k.kinerja[idx];
          return `<div class="summary-item">
            <span>${k.name}</span>
            <span class="summary-pill ${g.cls}">${v.toFixed(1)}%</span>
          </div>`;
        }).join('')
      : `<div style="font-size:.78rem; color:var(--text-secondary); padding:8px 0;">Tidak ada</div>`;
    return `<div class="summary-card">
      <div class="summary-title">${g.title}</div>
      ${listHtml}
    </div>`;
  }).join('');
}

function renderAll() {
  renderKPIRow();
  renderTrendCharts();
  renderSummary();
}

async function loadData() {
  const errBox = document.getElementById('errbox');
  errBox.style.display = 'none';
  document.getElementById('updateTime').textContent = 'Memuat data...';

  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = text.trim().split('\n').map(row => {
      const cols = []; let cur = '', inQ = false;
      for (const c of row) {
        if (c === '"') inQ = !inQ;
        else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else cur += c;
      }
      cols.push(cur.trim()); return cols;
    });

    allData = KPIS.map(k => {
      const real = [], target = [], kinerja = [];
      let lastIdx = 0;
      for (let m = 0; m < 12; m++) {
        const col = k.colJan + m;
        const r = pNum(rows[k.rowReal]?.[col]);
        const t = pNum(rows[k.rowTarget]?.[col]);
        const kv = pNum(rows[k.rowKinerja]?.[col]);
        real.push(r); target.push(t); kinerja.push(kv);
        if (kv !== null && kv > 0) lastIdx = m;
      }
      return { ...k, real, target, kinerja, lastIdx };
    });

    globalLastIdx = Math.max(...allData.map(k => k.lastIdx));
    buildMonthSelect(globalLastIdx);
    renderAll();

    const now = new Date();
    document.getElementById('updateTime').textContent = 'Diperbarui: ' + now.toLocaleTimeString('id-ID') + ' &middot; Sumber: RAW DASHBOARD ARIES';
  } catch(e) {
    errBox.style.display = 'block';
    errBox.textContent = 'Gagal memuat data: ' + e.message + '. Pastikan file dijalankan lewat web server (bukan dibuka langsung dari file lokal).';
    document.getElementById('updateTime').textContent = 'Gagal memuat';
  }
}

document.getElementById('monthSelect').addEventListener('change', (e) => {
  selectedMonthIdx = parseInt(e.target.value);
  renderAll();
});

document.getElementById('refreshBtn').addEventListener('click', loadData);

const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');
const mobileBtn = document.getElementById('mobileMenuBtn');

function handleMobile() {
  if (window.innerWidth <= 768) {
    sidebar.classList.remove('collapsed');
    content.classList.remove('collapsed');
  } else {
    sidebar.classList.remove('mobile-open');
    if (!sidebar.classList.contains('collapsed')) {
      sidebar.classList.add('collapsed');
      content.classList.add('collapsed');
    }
  }
}
mobileBtn.addEventListener('click', () => sidebar.classList.toggle('mobile-open'));

if (window.innerWidth > 768) {
  sidebar.addEventListener('mouseenter', () => { sidebar.classList.remove('collapsed'); content.classList.remove('collapsed'); });
  sidebar.addEventListener('mouseleave', () => { sidebar.classList.add('collapsed'); content.classList.add('collapsed'); });
}
window.addEventListener('resize', handleMobile);
handleMobile();

function toggleTheme() {
  document.body.classList.toggle('light-mode');
  const icon = document.getElementById('themeIcon');
  if (document.body.classList.contains('light-mode')) {
    icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
    localStorage.setItem('kpiTheme', 'light');
  } else {
    icon.classList.remove('fa-sun'); icon.classList.add('fa-moon');
    localStorage.setItem('kpiTheme', 'dark');
  }
  renderAll();
}
document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);
if (localStorage.getItem('kpiTheme') === 'light') {
  document.body.classList.add('light-mode');
  document.getElementById('themeIcon').classList.remove('fa-moon');
  document.getElementById('themeIcon').classList.add('fa-sun');
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
